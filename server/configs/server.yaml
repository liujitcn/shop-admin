server:
  http:
    addr: :8091
    timeout: 10s
    enable_swagger: true
    enable_pprof: true
    cors:
      headers:
        - "X-Requested-With"
        - "X-Request-ID"
        - "Content-Type"
        - "Authorization"
      methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "HEAD"
        - "OPTIONS"
      origins:
        - "*"
    middleware:
      enable_logging: true
      enable_recovery: true
      enable_tracing: true
      enable_validate: true
      enable_circuit_breaker: true
      enable_metadata: true

  grpc:
    addr: 0.0.0.0:6001
    timeout: 10s
    middleware:
      enable_recovery: true
      enable_logging: true
      enable_tracing: true
      enable_validate: false
      enable_metadata: true
      enable_circuit_breaker: false